# Interview Analyzer configuration
# All settings here are safe defaults for a free, fully-local setup.

# --- Retention ---
# Number of days raw audio recordings are kept before automatic deletion.
# Transcripts and analysis (small text/JSON) are kept permanently regardless
# of this setting, since they're what powers trend tracking.
retention_days: 3

# --- Watcher ---
# Process names (Windows) or browser tab title substrings that trigger
# auto-recording when detected running. Extend this list for other apps.
watched_processes:
  desktop_apps:
  - "Teams.exe"
  - "Teams2.exe"          # new Teams client
  - "CiscoWebExStart.exe"
  - "webexmta.exe"
  - "Zoom.exe"
  - "AmazonChime.exe"
  # macOS-only variant of desktop_apps -- used instead of the list above
  # when running on macOS (see watcher.py's _platform_process_list()).
  # macOS process names have no ".exe" suffix and often differ from the
  # Windows executable name entirely; these are the common ones as of
  # writing, but app updates can rename the actual process -- if detection
  # ever misses a real call, check the real process name (Activity Monitor)
  # and update this list, or use the dashboard's "Start recording" button
  # as a manual fallback in the meantime.
  desktop_apps_macos:
  - "Microsoft Teams"
  - "Teams"               # new Teams client
  - "Webex"
  - "Amazon Chime"
  - "zoom.us"
  browser_tab_keywords:
    # Matched against browser window/tab titles when a browser process
    # (chrome.exe, msedge.exe, firefox.exe) is running. This is inherently
    # a weaker signal than a desktop app process (see
    # browser_start_debounce_polls below) -- e.g. Meet's pre-join lobby/
    # camera-check screen matches the same way an actual call does, since
    # it shows the same title before you've actually joined.
    #
    # Google Meet's real tab title is "Meet – <code> - Google Chrome" using
    # an EN DASH (–, U+2013), not a plain hyphen -- verified against a live
    # call. A plain-hyphen "Meet - " keyword is deliberately NOT included:
    # every Chrome/Edge tab title ends with " - Google Chrome"/" - <profile>
    # - Microsoft Edge", so "Meet - " would coincidentally match the bare
    # "Google Meet" homepage tab too ("Google Meet - Google Chrome"),
    # bringing back the over-detection this was meant to fix. If detection
    # ever misses a real call, use the dashboard's "Start recording" button
    # as a manual fallback rather than widening this keyword.
  - "Meet – "
  - "Zoom Meeting"
  - "webex.com"
  - "chime.aws"
  - "teams.microsoft.com"
  browser_processes:
  - "chrome.exe"
  - "msedge.exe"
  - "firefox.exe"
  # macOS-only variant of browser_processes (see desktop_apps_macos above
  # for why these lists differ per platform).
  browser_processes_macos:
  - "Google Chrome"
  - "Microsoft Edge"
  - "firefox"
  - "Safari"

# How often (seconds) the watcher polls running processes/window titles.
poll_interval_seconds: 5.0

# Require the meeting window/process to be present for this many consecutive
# polls before starting recording, to avoid false triggers from a window
# flashing open briefly. Only applies to desktop-app detection (Zoom.exe
# etc.) -- see browser_start_debounce_polls for browser tabs.
start_debounce_polls: 2

# Same idea, but for browser-tab-title matches specifically, which are a
# much weaker signal than a real app process being open (a Meet tab sitting
# on the pre-join lobby screen matches the exact same way an actual call
# does -- see the comment on browser_tab_keywords above). Deliberately
# higher than start_debounce_polls so a brief glance at a meeting tab
# before deciding not to join doesn't trigger a consent prompt. Default
# 6 * 5s = 30s.
browser_start_debounce_polls: 6

# Require the meeting window/process to be ABSENT for this many consecutive
# polls before stopping an in-progress recording. Deliberately much higher
# than start_debounce_polls: browser-tab-title detection can flicker
# mid-call (a title that stops matching for one poll shouldn't end the
# recording), and a false early stop loses part of the interview, while a
# late stop just costs a few extra seconds of audio. Default 12 * 5s = 60s.
stop_debounce_polls: 12

# After a recording ends (call closed, or manually stopped), don't re-prompt
# for the same app for this many seconds -- a just-ended call's window/tab
# can briefly linger and keep matching the detection keywords (e.g. a Meet
# tab still open on the post-call screen) even though the call is over.
post_call_cooldown_seconds: 30

# After declining to record ("No" on the consent prompt), don't ask again
# for the same still-detected app for this many seconds. This is a safety
# net, not just a convenience: browser-tab detection can occasionally keep
# matching well past when you've actually left the call (see
# browser_tab_keywords above), which would otherwise mean never being
# prompted again for a genuinely new call without restarting the app.
declined_cooldown_seconds: 300.0

# --- Recording ---
audio:
  sample_rate: 16000        # sufficient for speech, keeps file size small
  channels: 1
  bitrate_kbps: 64
  format: "opus"            # small, good speech quality; falls back to mp3
  raw_dir: "data/audio"
  # System-audio (loopback) capture alone only gets what you HEAR --
  # the interviewer's side. This mixes in your own microphone too, so your
  # answers are actually in the transcript. If Windows blocks microphone
  # access for desktop apps, recording falls back to system audio only
  # (logged as a warning) rather than failing -- see
  # Settings > Privacy & security > Microphone > "Let desktop apps access
  # your microphone".
  include_microphone: true

# --- Transcription ---
transcription:
  engine: "faster-whisper"  # local, free
  # tiny|base|small|medium|large-v3 (bigger = slower, more accurate). Bumped
  # from "small" -- Whisper's accuracy on accented (e.g. Indian) English
  # improves noticeably with model size, and "small" was producing visibly
  # more mis-hearings on accented speech in testing. "medium" is ~2-3x
  # slower to transcribe on CPU than "small"; drop back down if that's too
  # slow for your machine, or go to "large-v3" if it's fast enough and you
  # want to push accuracy further.
  whisper_model: "medium"
  device: "cpu"             # set to "cuda" if you have a supported GPU
  # Transcribe the call in the background WHILE it's being recorded,
  # in periodic chunks (live_segment_seconds each), instead of waiting
  # until it ends to start transcribing the whole thing -- this is what
  # makes processing finish quickly after a long call: only the last
  # partial chunk is left to transcribe once it ends. Recording itself is
  # never touched by this (it only reads the audio file, never the
  # recorder) -- see live_transcribe.py's module docstring for the safety
  # details. Automatically falls back to transcribing the whole call
  # afterwards (today's original behavior) if anything about this fails,
  # so turning it off is only ever a speed tradeoff, never a correctness
  # one. Set to false to disable.
  live_during_recording: true
  # How often (seconds of actually-recorded audio, i.e. pause time doesn't
  # count) a chunk gets transcribed during the call. Smaller = the final
  # post-call wait is shorter, but more overhead reloading/re-running
  # Whisper more often; larger = fewer, bigger chunks. 300s (5 min) is a
  # reasonable default for a typical interview length.
  live_segment_seconds: 300
  # Separate speakers (You vs Interviewer) in the transcript. Uses whichever
  # mechanism is actually available for a given recording, automatically:
  #   - Preferred: channel separation -- when the microphone was captured
  #     (see audio.include_microphone above), it's recorded on its own
  #     channel, separate from system audio, so labeling is a matter of
  #     which channel a word came from rather than a guess. No extra setup.
  #   - Fallback: acoustic diarization via pyannote.audio, only used for
  #     recordings with no separate mic channel. Needs a one-time Hugging
  #     Face account/token -- see docs/diarization_setup.md.
  # Set to false to disable speaker labels entirely (a single "[Speaker]"
  # label for everyone).
  diarization: true
  # Voice-activity-detection pre-filter. Without this, Whisper decodes fixed
  # ~30s windows regardless of content -- a real bug found in testing: a
  # quiet utterance right after a long pause (e.g. waiting for participants
  # to join) landed inside a mostly-silent window and its speech was
  # silently dropped from the transcript. vad_filter segments on actual
  # speech first, which fixed that exact case. Leave this on unless you
  # have a specific reason to disable it.
  vad_filter: true
  # Whisper supports ~99 languages (see docs/language_support.md for the
  # constraints/notes on accuracy per language and on code-switching).
  #   "auto"      - detect automatically per recording
  #   "en"        - force English (default -- see below)
  #   "hi"        - force Hindi (Devanagari script output)
  #   "hinglish"  - Hindi audio with code-switched English, romanized to
  #                 Latin script where possible (needs the optional
  #                 indic-transliteration package -- see docs/language_support.md)
  # Pinned to "en" rather than "auto": Whisper's language-ID step (what
  # "auto" relies on) looks only at the first ~30s of audio, and strongly
  # accented English is a common way for it to misdetect the language
  # entirely -- once that happens, the whole transcript comes out garbled
  # or in the wrong language. Forcing "en" skips that guesswork. Switch
  # back to "auto" if your interviews are regularly in a different language.
  language: "en"
  # A short style/context hint passed to Whisper to bias decoding towards
  # this kind of audio -- helps with accented and informal/disfluent
  # speech (filler words, casual phrasing) that Whisper otherwise tends to
  # "clean up" into a different, less accurate sentence. See
  # docs/language_support.md. Set to "" to disable.
  initial_prompt: "This is an unscripted, informal spoken interview in English, possibly with an Indian accent. Transcribe exactly what is said, including filler words like um, uh, so, actually, basically, and casual phrasing."

# --- Analysis ---
# "engine" selects which AnalysisEngine to use (see src/interview_analyzer/engines.py).
# Built-in options: "ollama" (free, local, default), "anthropic_api", "openai_api".
# You can also register your own engine in code -- see docs/using_cloud_apis.md.
analysis:
  engine: "ollama"
  # Free-tier model guidance:
  #   llama3.1:8b   - fast, runs on most laptops, default below
  #   qwen2.5:14b   - noticeably better reasoning/instruction-following for
  #                   this kind of structured rubric scoring, if your machine
  #                   has ~16GB+ RAM to spare. Recommended if you can run it.
  llm_model: "llama3.1:8b"
  ollama_host: "http://localhost:11434"
  # Only used when engine is "anthropic_api" or "openai_api". This must be a
  # real API key from console.anthropic.com / platform.openai.com -- a
  # claude.ai subscription does NOT provide API access.
  cloud_api_key_env_var: "INTERVIEW_ANALYZER_API_KEY"

# --- Storage ---
storage:
  db_path: "data/interviews.db"

# --- Output ---
output:
  output_dir: "output"
  reports_subdir: "reports"
  trends_filename: "trends.md"
